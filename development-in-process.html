<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>В разработке | DIVE HELP 78</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        html {
            height: -webkit-fill-available;
        }

        body {
            /* Фоновое изображение воды */
            background: #f0f6fc url('https://images.unsplash.com/photo-1682687220063-4742bd7fd538?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            color: #1e293b;
            line-height: 1.6;
            
            /* Настройки для центрирования контента */
            display: flex;
            align-items: center;
            justify-content: center;
            
            /* Мобильный фикс высоты и отступов */
            min-height: 100vh;
            min-height: 100dvh;
            padding: calc(max(20px, env(safe-area-inset-top)) + 20px) 20px calc(max(20px, env(safe-area-inset-bottom)) + 20px) !important;
            position: relative;
            overflow: hidden; /* Скрываем вылезающие за край экрана пузырьки */
        }

        /* Глобальный размытый оверлей для идеальной читаемости (тот самый фикс) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(240, 248, 255, 0.75) 0%, rgba(224, 242, 254, 0.85) 100%);
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            z-index: -1;
            pointer-events: none;
        }

        .construction-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 50px rgba(0, 119, 255, 0.1);
            border-radius: 32px;
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .icon-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gear-icon {
            font-size: 5rem;
            color: rgba(0, 119, 255, 0.15);
            position: absolute;
            animation: spin 10s linear infinite;
        }

        .diver-icon {
            font-size: 4rem;
            color: #0077ff;
            position: relative;
            z-index: 2;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 10px 15px rgba(0, 119, 255, 0.3));
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        .title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .description {
            font-size: 1.1rem;
            color: #475569;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 35px;
            background: linear-gradient(135deg, #0077ff 0%, #00d4ff 100%);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            border-radius: 50px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(0, 119, 255, 0.25);
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 119, 255, 0.4);
        }

        .bubbles {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
            pointer-events: none;
        }

        .bubble {
            position: absolute;
            bottom: -50px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.6);
            animation: rise 10s infinite ease-in;
        }

        /* Настройка отдельных пузырьков */
        .bubble:nth-child(1) { width: 40px; height: 40px; left: 10%; animation-duration: 8s; animation-delay: 0s; }
        .bubble:nth-child(2) { width: 20px; height: 20px; left: 25%; animation-duration: 5s; animation-delay: 2s; }
        .bubble:nth-child(3) { width: 50px; height: 50px; left: 45%; animation-duration: 12s; animation-delay: 1s; }
        .bubble:nth-child(4) { width: 30px; height: 30px; left: 65%; animation-duration: 7s; animation-delay: 3s; }
        .bubble:nth-child(5) { width: 25px; height: 25px; left: 85%; animation-duration: 9s; animation-delay: 0.5s; }
        .bubble:nth-child(6) { width: 15px; height: 15px; left: 55%; animation-duration: 6s; animation-delay: 4s; }

        @keyframes rise {
            0% {
                bottom: -50px;
                transform: translateX(0) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            50% {
                transform: translateX(20px) scale(1.1);
            }
            100% {
                bottom: 110vh;
                transform: translateX(-20px) scale(0.9);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .construction-card {
                padding: 40px 25px;
                border-radius: 24px;
            }

            .title {
                font-size: 1.8rem;
            }

            .description {
                font-size: 1rem;
                margin-bottom: 30px;
            }

            .icon-container {
                width: 100px;
                height: 100px;
                margin-bottom: 20px;
            }

            .gear-icon { font-size: 4rem; }
            .diver-icon { font-size: 3rem; }
            
            .btn-home {
                width: 100%;
                justify-content: center;
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Фоновые анимированные пузырьки -->
    <div class="bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <!-- Основная карточка заглушки -->
    <div class="construction-card">
        <div class="icon-container">
            <i class="fa-solid fa-gear gear-icon"></i>
            <i class="fa-solid fa-person-diving diver-icon"></i>
        </div>
        
        <h1 class="title">Эта страница все еще в разработке...</h1>
        <p class="description">
            Эта страница пока находится на дне, но наши специалисты уже работают над её поднятием. Возвращайтесь за обновлениями!
        </p>
        
        <a href="index.html" class="btn-home">
            <i class="fa-solid fa-arrow-left-long"></i>
            Вернуться на главную
        </a>
    </div>

</body>
</html>
